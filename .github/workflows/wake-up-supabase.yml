name: Wake Up Supabase

on:
  schedule:
    - cron: "0 6 * * *"   # Runs once per day at 06:00 UTC
  workflow_dispatch:       # Allows manual runs from the Actions tab

jobs:
  ping-projects:
    runs-on: ubuntu-latest

    steps:


      - name: Ping Supabase projects to keep them awake
        env:
          SUPABASE_PROJECTS_JSON: '[{"url": "https://dlcqhdnytttexfjzvrcu.supabase.co","anon_key": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsY3FoZG55dHR0ZXhmanp2cmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NjQ0MjcsImV4cCI6MjA4ODU0MDQyN30.meibang-Kc4psT3q2B1b3ZS1zqYqJGg-LK_MX-gpuUE"}]'
        run: |
          # Install jq for JSON parsing
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y jq > /dev/null

          LENGTH=$(echo "$SUPABASE_PROJECTS_JSON" | jq '. | length')
          echo "📦 Found $LENGTH Supabase project(s)."

          if [ "$LENGTH" -eq 0 ]; then
            echo "⚠️ No projects defined in SUPABASE_PROJECTS_JSON."
            exit 0
          fi

          for i in $(seq 0 $((LENGTH - 1))); do
            URL=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].url")
            KEY=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].anon_key")

            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "⚠️ Skipping project at index $i — missing url."
              continue
            fi

            if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
              echo "⚠️ Skipping $URL — missing anon_key."
              continue
            fi

            # Auth health endpoint – always exists and is safe to call with anon key
            HEALTH_URL="${URL%/}/auth/v1/health"
            echo "🌐 Pinging AUTH via: $HEALTH_URL"

            # Allow curl to fail without killing the whole job
            set +e
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $KEY" \
              "$HEALTH_URL")
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "❌ Curl failed for $URL (exit code $CURL_EXIT). Skipping."
              continue
            fi

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ $URL responded with HTTP $HTTP_CODE — project is reachable."
            else
              echo "❌ $URL responded with HTTP $HTTP_CODE — check project status or URL."
            fi
          done
